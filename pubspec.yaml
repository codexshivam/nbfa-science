name: nbfa_science
description: "School website for NBFA Science, built with Flutter Web."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  go_router: ^16.0.0
  google_fonts: ^6.3.2
  flutter_animate: ^4.5.2
  table_calendar: ^3.2.0
  flutter_staggered_grid_view: ^0.7.0
  awesome_dialog: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true
  assets:
    - assets/data/school_data.json
